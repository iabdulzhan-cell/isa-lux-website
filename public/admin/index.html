<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель — ISA LUX</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    :root { --sidebar-w: 240px; }
    body { background: var(--gray-100); padding: 0; }
    /* Sidebar */
    .admin-sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-w);
      background: var(--black); z-index: 100; display: flex; flex-direction: column;
      border-right: 1px solid rgba(201,168,76,0.15);
    }
    .admin-logo {
      padding: 24px 20px; border-bottom: 1px solid rgba(201,168,76,0.15);
      font-family: var(--font-serif); color: var(--white);
    }
    .admin-logo span { display: block; font-size: 1.2rem; font-weight: 700; letter-spacing: 0.15em; color: var(--gold); }
    .admin-logo small { font-size: 0.68rem; letter-spacing: 0.2em; color: rgba(255,255,255,0.3); text-transform: uppercase; }
    .admin-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
    .admin-nav-item {
      display: flex; align-items: center; gap: 12px; padding: 11px 14px;
      border-radius: var(--radius-md); color: rgba(255,255,255,0.6); font-size: 0.88rem;
      font-weight: 500; cursor: pointer; transition: var(--transition); margin-bottom: 2px;
      border: none; width: 100%; text-align: left;
    }
    .admin-nav-item:hover { color: var(--white); background: rgba(255,255,255,0.06); }
    .admin-nav-item.active { color: var(--gold); background: rgba(201,168,76,0.12); }
    .admin-nav-item span:first-child { font-size: 1.1rem; width: 20px; text-align: center; }
    .admin-nav-section { font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.2); padding: 16px 14px 6px; margin-top: 8px; }
    .admin-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.08); }
    /* Main */
    .admin-main { margin-left: var(--sidebar-w); min-height: 100vh; }
    .admin-topbar {
      background: var(--white); padding: 0 32px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--gray-200); position: sticky; top: 0; z-index: 50;
    }
    .admin-topbar h2 { font-size: 1rem; font-weight: 600; }
    .admin-content { padding: 32px; }
    /* Stats Cards */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
    .stat-card {
      background: var(--white); border-radius: var(--radius-lg); padding: 24px;
      border: 1px solid var(--gray-200); transition: var(--transition);
    }
    .stat-card:hover { box-shadow: var(--shadow-md); }
    .stat-card-icon { font-size: 2rem; margin-bottom: 12px; }
    .stat-card-num { font-family: var(--font-serif); font-size: 1.75rem; font-weight: 700; color: var(--black); }
    .stat-card-label { font-size: 0.8rem; color: var(--gray-400); margin-top: 4px; }
    .stat-card-change { font-size: 0.78rem; margin-top: 8px; font-weight: 600; }
    .stat-card-change.up { color: var(--success); }
    .stat-card-change.alert { color: var(--warning); }
    .stat-card.gold { border-color: var(--gold-light); background: linear-gradient(135deg, rgba(201,168,76,0.05), var(--white)); }
    .stat-card.gold .stat-card-num { color: var(--gold-dark); }
    /* Table */
    .admin-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .admin-table th { background: var(--gray-100); padding: 12px 16px; text-align: left; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--gray-600); border-bottom: 1px solid var(--gray-200); }
    .admin-table td { padding: 14px 16px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
    .admin-table tr:hover td { background: var(--off-white); }
    .admin-table tr:last-child td { border-bottom: none; }
    /* Status badges */
    .status-badge { padding: 3px 10px; border-radius: 50px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .status-new { background: #e3f2fd; color: #1565c0; }
    .status-confirmed { background: #e8f5e9; color: #2e7d32; }
    .status-processing { background: #fff3e0; color: #e65100; }
    .status-shipped { background: #f3e5f5; color: #6a1b9a; }
    .status-delivered { background: #e8f5e9; color: #1b5e20; }
    .status-cancelled { background: #ffebee; color: #b71c1c; }
    /* Card panel */
    .admin-panel { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--gray-200); overflow: hidden; }
    .admin-panel-header { padding: 20px 24px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; justify-content: space-between; }
    .admin-panel-header h3 { font-size: 1rem; font-weight: 600; }
    .admin-panel-body { padding: 0; overflow-x: auto; }
    /* Product image in table */
    .table-img { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background: var(--gray-100); }
    /* Form modal */
    .admin-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .admin-modal { background: var(--white); border-radius: var(--radius-xl); max-width: 640px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .admin-modal-header { padding: 24px 28px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; }
    .admin-modal-body { padding: 28px; }
    .admin-modal-footer { padding: 16px 28px; border-top: 1px solid var(--gray-200); display: flex; justify-content: flex-end; gap: 12px; }
    @media(max-width:1024px) { .stats-grid { grid-template-columns: repeat(2,1fr); } }
    @media(max-width:768px) { .admin-sidebar { display: none; } .admin-main { margin-left: 0; } .stats-grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="admin-sidebar">
  <div class="admin-logo">
    <span>ISA LUX</span>
    <small>Admin Panel</small>
  </div>
  <nav class="admin-nav">
    <div class="admin-nav-section">Основное</div>
    <button class="admin-nav-item active" data-page="dashboard">
      <span>📊</span><span>Дашборд</span>
    </button>
    <button class="admin-nav-item" data-page="orders">
      <span>📦</span><span>Заказы</span>
      <span id="new-orders-badge" style="background:var(--gold);color:var(--black);border-radius:50px;padding:2px 7px;font-size:0.68rem;font-weight:700;margin-left:auto"></span>
    </button>
    <div class="admin-nav-section">Каталог</div>
    <button class="admin-nav-item" data-page="products">
      <span>🧴</span><span>Товары</span>
    </button>
    <button class="admin-nav-item" data-page="categories">
      <span>📁</span><span>Категории</span>
    </button>
    <div class="admin-nav-section">Клиенты</div>
    <button class="admin-nav-item" data-page="users">
      <span>👥</span><span>Пользователи</span>
    </button>
    <button class="admin-nav-item" data-page="wholesale-requests">
      <span>🏢</span><span>Заявки опта</span>
      <span id="ws-badge" style="background:#e53;color:#fff;border-radius:50px;padding:2px 7px;font-size:0.68rem;font-weight:700;margin-left:auto"></span>
    </button>
    <div class="admin-nav-section">Настройки</div>
    <button class="admin-nav-item" data-page="banners">
      <span>🖼️</span><span>Баннеры</span>
    </button>
  </nav>
  <div class="admin-footer">
    <button class="admin-nav-item" id="logout-btn">
      <span>🚪</span><span>Выйти</span>
    </button>
    <a href="/" target="_blank" class="admin-nav-item" style="text-decoration:none;margin-top:4px">
      <span>🌐</span><span>Открыть сайт</span>
    </a>
  </div>
</aside>

<!-- Main -->
<main class="admin-main">
  <div class="admin-topbar">
    <h2 id="page-title">Дашборд</h2>
    <div style="display:flex;align-items:center;gap:16px">
      <span id="admin-name" style="font-size:0.85rem;color:var(--gray-600)"></span>
      <div style="width:36px;height:36px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem">A</div>
    </div>
  </div>

  <div class="admin-content" id="admin-content">
    <!-- Dynamic content -->
  </div>
</main>

<div id="toast-container"></div>

<script type="module">
  import { api, toast, logout } from '/js/app.js';

  // Auth check
  let me;
  try {
    me = await api('GET', '/api/auth/me');
    if (me.role !== 'admin') { window.location.href = '/login'; }
    document.getElementById('admin-name').textContent = me.name;
  } catch { window.location.href = '/login'; }

  // ── Navigation ─────────────────────────────────────────────
  let currentPage = 'dashboard';
  document.querySelectorAll('.admin-nav-item[data-page]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentPage = btn.dataset.page;
      document.querySelectorAll('.admin-nav-item').forEach(b => b.classList.toggle('active', b === btn));
      document.getElementById('page-title').textContent = btn.querySelector('span:nth-child(2)').textContent;
      renderPage(currentPage);
    });
  });

  document.getElementById('logout-btn').addEventListener('click', logout);

  // ── Pages ──────────────────────────────────────────────────

  async function renderPage(page) {
    const content = document.getElementById('admin-content');
    content.innerHTML = '<div style="display:flex;justify-content:center;padding:80px"><div class="spinner"></div></div>';

    switch(page) {
      case 'dashboard': await renderDashboard(); break;
      case 'orders': await renderOrders(); break;
      case 'products': await renderProducts(); break;
      case 'users': await renderUsers(); break;
      case 'wholesale-requests': await renderWholesaleRequests(); break;
      default: content.innerHTML = '<p style="padding:40px;color:var(--gray-400)">Страница в разработке</p>';
    }
  }

  // ── Dashboard ──────────────────────────────────────────────
  async function renderDashboard() {
    const stats = await api('GET', '/api/admin/stats');
    document.getElementById('admin-content').innerHTML = `
      <div class="stats-grid">
        <div class="stat-card gold">
          <div class="stat-card-icon">💰</div>
          <div class="stat-card-num">${Number(stats.total_revenue).toLocaleString('ru')} ₸</div>
          <div class="stat-card-label">Общая выручка</div>
          <div class="stat-card-change up">За сегодня: ${Number(stats.today_revenue).toLocaleString('ru')} ₸</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon">📦</div>
          <div class="stat-card-num">${stats.total_orders}</div>
          <div class="stat-card-label">Всего заказов</div>
          <div class="stat-card-change up">Сегодня: ${stats.today_orders}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon">👥</div>
          <div class="stat-card-num">${stats.total_users}</div>
          <div class="stat-card-label">Клиентов</div>
          ${stats.pending_wholesale > 0 ? `<div class="stat-card-change alert">⚠️ Ожидают одобрения: ${stats.pending_wholesale}</div>` : ''}
        </div>
        <div class="stat-card">
          <div class="stat-card-icon">🧴</div>
          <div class="stat-card-num">${stats.total_products}</div>
          <div class="stat-card-label">Товаров</div>
          ${stats.low_stock > 0 ? `<div class="stat-card-change alert">⚠️ Мало на складе: ${stats.low_stock}</div>` : ''}
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
        <div class="admin-panel">
          <div class="admin-panel-header">
            <h3>Последние заказы</h3>
            <button class="btn btn-sm btn-outline" onclick="window.adminNav('orders')">Все →</button>
          </div>
          <div id="recent-orders" class="admin-panel-body"><div style="padding:20px;text-align:center"><div class="spinner"></div></div></div>
        </div>
        <div class="admin-panel">
          <div class="admin-panel-header">
            <h3>Заявки оптовых клиентов</h3>
            <button class="btn btn-sm btn-outline" onclick="window.adminNav('wholesale-requests')">Все →</button>
          </div>
          <div id="ws-requests" class="admin-panel-body"><div style="padding:20px;text-align:center"><div class="spinner"></div></div></div>
        </div>
      </div>`;

    // Recent orders
    const { orders } = await api('GET', '/api/admin/orders?limit=5');
    document.getElementById('recent-orders').innerHTML = `
      <table class="admin-table">
        <thead><tr><th>Заказ</th><th>Клиент</th><th>Сумма</th><th>Статус</th></tr></thead>
        <tbody>${orders.map(o => `
          <tr>
            <td><strong>${o.order_number}</strong><br><small>${new Date(o.created_at).toLocaleDateString('ru')}</small></td>
            <td>${o.guest_name}<br><small style="color:var(--gray-400)">${o.guest_phone}</small></td>
            <td><strong>${Number(o.total).toLocaleString('ru')} ₸</strong></td>
            <td><span class="status-badge status-${o.status}">${statusLabel(o.status)}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>`;

    // Wholesale requests
    const { users } = await api('GET', '/api/admin/users?role=wholesale');
    const pending = users?.filter(u => !u.is_approved) || [];
    document.getElementById('ws-requests').innerHTML = pending.length
      ? `<table class="admin-table">
          <thead><tr><th>Имя</th><th>Компания</th><th>Действие</th></tr></thead>
          <tbody>${pending.map(u => `
            <tr>
              <td>${u.name}<br><small>${u.email}</small></td>
              <td>${u.company || '—'}</td>
              <td><button class="btn btn-sm btn-gold" onclick="approveUser('${u.id}', this)">✓ Одобрить</button></td>
            </tr>`).join('')}
          </tbody>
        </table>`
      : `<p style="padding:24px;text-align:center;color:var(--gray-400)">Нет новых заявок</p>`;
  }

  // ── Orders ────────────────────────────────────────────────
  async function renderOrders(status = '') {
    const { orders, total } = await api('GET', `/api/admin/orders?limit=30${status ? '&status='+status : ''}`);
    document.getElementById('admin-content').innerHTML = `
      <div class="admin-panel">
        <div class="admin-panel-header">
          <h3>Заказы (${total})</h3>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${['', 'new','confirmed','processing','shipped','delivered','cancelled'].map(s =>
              `<button class="btn btn-sm ${status===s ? 'btn-black' : 'btn-ghost'}" onclick="window.filterOrders('${s}')">${s ? statusLabel(s) : 'Все'}</button>`
            ).join('')}
          </div>
        </div>
        <div class="admin-panel-body">
          <table class="admin-table">
            <thead><tr><th>Заказ №</th><th>Дата</th><th>Клиент</th><th>Сумма</th><th>Оплата</th><th>Доставка</th><th>Статус</th><th>Действия</th></tr></thead>
            <tbody>${orders.map(o => `
              <tr>
                <td><strong>${o.order_number}</strong></td>
                <td>${new Date(o.created_at).toLocaleDateString('ru')}</td>
                <td>${o.guest_name}<br><small style="color:var(--gray-400)">${o.guest_phone}</small></td>
                <td><strong>${Number(o.total).toLocaleString('ru')} ₸</strong></td>
                <td><small>${o.payment_method || '—'}</small></td>
                <td><small>${o.delivery_type || '—'}</small></td>
                <td>
                  <select class="sort-select" style="padding:6px 8px;font-size:0.8rem" onchange="updateOrderStatus('${o.id}', this.value)">
                    ${['new','confirmed','processing','shipped','delivered','cancelled'].map(s =>
                      `<option value="${s}" ${o.status===s?'selected':''}>${statusLabel(s)}</option>`
                    ).join('')}
                  </select>
                </td>
                <td><button class="btn btn-sm btn-outline" onclick="viewOrder('${o.id}')">Детали</button></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  }

  // ── Products ──────────────────────────────────────────────
  async function renderProducts() {
    const { products, total } = await api('GET', '/api/admin/products?limit=30');
    document.getElementById('admin-content').innerHTML = `
      <div class="admin-panel">
        <div class="admin-panel-header">
          <h3>Товары (${total})</h3>
          <button class="btn btn-gold btn-sm" onclick="window.openProductModal()">+ Добавить товар</button>
        </div>
        <div class="admin-panel-body">
          <table class="admin-table">
            <thead><tr><th>Фото</th><th>Название</th><th>Категория</th><th>Цена розн.</th><th>Цена опт.</th><th>Остаток</th><th>Статус</th><th></th></tr></thead>
            <tbody>${products.map(p => `
              <tr>
                <td>${p.images?.[0] ? `<img src="${p.images[0]}" class="table-img">` : '<div class="table-img" style="display:flex;align-items:center;justify-content:center;font-size:1.5rem">🧴</div>'}</td>
                <td><strong>${p.name_ru}</strong><br><small style="color:var(--gray-400)">${p.sku || ''}</small></td>
                <td><small>${p.categories?.name_ru || '—'}</small></td>
                <td><strong>${Number(p.retail_price).toLocaleString('ru')} ₸</strong></td>
                <td>${p.wholesale_price ? Number(p.wholesale_price).toLocaleString('ru') + ' ₸' : '—'}</td>
                <td><span style="color:${p.stock < 10 ? 'var(--error)' : p.stock < 20 ? 'var(--warning)' : 'var(--success)'}">${p.stock}</span></td>
                <td><span class="status-badge ${p.is_active ? 'status-delivered' : 'status-cancelled'}">${p.is_active ? 'Активен' : 'Скрыт'}</span></td>
                <td style="display:flex;gap:6px">
                  <button class="btn btn-sm btn-outline" onclick="window.openProductModal(${JSON.stringify(p).replace(/"/g, '&quot;')})">✏️</button>
                  <button class="btn btn-sm btn-ghost" onclick="toggleProduct('${p.id}', ${!p.is_active})">${p.is_active ? '👁️' : '🚫'}</button>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <!-- Product Modal -->
      <div id="product-modal" style="display:none" class="admin-modal-overlay">
        <div class="admin-modal">
          <div class="admin-modal-header">
            <h3 id="modal-title">Добавить товар</h3>
            <button onclick="document.getElementById('product-modal').style.display='none'" class="modal-close">✕</button>
          </div>
          <form id="product-form" class="admin-modal-body">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Название (RU) *</label>
                <input type="text" class="form-input" name="name_ru" required>
              </div>
              <div class="form-group">
                <label class="form-label">Название (KZ)</label>
                <input type="text" class="form-input" name="name_kz">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Название (EN)</label>
              <input type="text" class="form-input" name="name_en">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Цена розничная (₸) *</label>
                <input type="number" class="form-input" name="retail_price" required min="0">
              </div>
              <div class="form-group">
                <label class="form-label">Цена оптовая (₸)</label>
                <input type="number" class="form-input" name="wholesale_price" min="0">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Цена дистрибьютора (₸)</label>
                <input type="number" class="form-input" name="distributor_price" min="0">
              </div>
              <div class="form-group">
                <label class="form-label">Остаток (шт)</label>
                <input type="number" class="form-input" name="stock" min="0" value="0">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Ед. измерения</label>
                <input type="text" class="form-input" name="unit" value="шт" placeholder="шт / л / кг">
              </div>
              <div class="form-group">
                <label class="form-label">Объём / Вес</label>
                <input type="text" class="form-input" name="volume" placeholder="1л / 5кг">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Описание (RU)</label>
              <textarea class="form-textarea" name="description_ru" rows="3"></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">SKU</label>
              <input type="text" class="form-input" name="sku" placeholder="ISA-001">
            </div>
            <div style="display:flex;gap:16px;margin-top:8px">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                <input type="checkbox" name="is_featured" style="accent-color:var(--gold)">
                <span style="font-size:0.88rem">Хит продаж</span>
              </label>
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                <input type="checkbox" name="is_active" checked style="accent-color:var(--gold)">
                <span style="font-size:0.88rem">Активен</span>
              </label>
            </div>
          </form>
          <div class="admin-modal-footer">
            <button class="btn btn-ghost" onclick="document.getElementById('product-modal').style.display='none'">Отмена</button>
            <button class="btn btn-gold" id="save-product-btn">💾 Сохранить</button>
          </div>
        </div>
      </div>`;

    document.getElementById('save-product-btn').addEventListener('click', saveProduct);
  }

  // ── Users ─────────────────────────────────────────────────
  async function renderUsers() {
    const { users, total } = await api('GET', '/api/admin/users?limit=50');
    document.getElementById('admin-content').innerHTML = `
      <div class="admin-panel">
        <div class="admin-panel-header"><h3>Пользователи (${total})</h3></div>
        <div class="admin-panel-body">
          <table class="admin-table">
            <thead><tr><th>Имя</th><th>Email</th><th>Роль</th><th>Компания</th><th>Статус</th><th>Регистрация</th><th></th></tr></thead>
            <tbody>${users.map(u => `
              <tr>
                <td><strong>${u.name}</strong><br><small>${u.phone || '—'}</small></td>
                <td>${u.email}</td>
                <td><span class="status-badge ${u.role==='admin'?'status-shipped':u.role==='distributor'?'status-processing':u.role==='wholesale'?'status-confirmed':'status-new'}">${roleLabel(u.role)}</span></td>
                <td>${u.company || '—'}</td>
                <td>${!u.is_approved && u.role!=='retail' ? '<span class="status-badge status-cancelled">Ожидает</span>' : u.is_active ? '<span class="status-badge status-delivered">Активен</span>' : '<span class="status-badge status-cancelled">Блок</span>'}</td>
                <td><small>${new Date(u.created_at).toLocaleDateString('ru')}</small></td>
                <td style="display:flex;gap:6px">
                  ${!u.is_approved && ['wholesale','distributor'].includes(u.role) ? `<button class="btn btn-sm btn-gold" onclick="approveUser('${u.id}', this)">✓ Одобрить</button>` : ''}
                  <button class="btn btn-sm btn-ghost" onclick="toggleUser('${u.id}', ${!u.is_active}, this)">${u.is_active ? '🚫' : '✓'}</button>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  }

  async function renderWholesaleRequests() {
    const { users } = await api('GET', '/api/admin/users?limit=50');
    const pending = users?.filter(u => ['wholesale','distributor'].includes(u.role) && !u.is_approved) || [];
    document.getElementById('admin-content').innerHTML = `
      <div class="admin-panel">
        <div class="admin-panel-header"><h3>Заявки на оптовый аккаунт (${pending.length})</h3></div>
        <div class="admin-panel-body">
          ${!pending.length ? '<p style="padding:40px;text-align:center;color:var(--gray-400)">Нет новых заявок ✓</p>' :
          `<table class="admin-table">
            <thead><tr><th>Имя</th><th>Email</th><th>Телефон</th><th>Компания</th><th>БИН</th><th>Роль</th><th>Дата</th><th>Действие</th></tr></thead>
            <tbody>${pending.map(u => `
              <tr>
                <td><strong>${u.name}</strong></td>
                <td>${u.email}</td>
                <td>${u.phone || '—'}</td>
                <td>${u.company || '—'}</td>
                <td>${u.bin || '—'}</td>
                <td><span class="status-badge status-processing">${roleLabel(u.role)}</span></td>
                <td><small>${new Date(u.created_at).toLocaleDateString('ru')}</small></td>
                <td style="display:flex;gap:6px">
                  <button class="btn btn-sm btn-gold" onclick="approveUser('${u.id}', this)">✓ Одобрить</button>
                  <button class="btn btn-sm btn-ghost" onclick="rejectUser('${u.id}', this)">✕ Отклонить</button>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>`}
        </div>
      </div>`;
  }

  // ── Actions ────────────────────────────────────────────────
  window.approveUser = async (id, btn) => {
    btn.disabled = true;
    await api('PUT', `/api/admin/users/${id}/approve`);
    toast('Клиент одобрен ✓', 'success');
    btn.closest('tr').remove();
  };

  window.rejectUser = async (id, btn) => {
    await api('PUT', `/api/admin/users/${id}`, { is_active: false });
    toast('Заявка отклонена', 'info');
    btn.closest('tr').remove();
  };

  window.filterOrders = (status) => renderOrders(status);
  window.adminNav = (page) => {
    currentPage = page;
    document.querySelectorAll('.admin-nav-item[data-page]').forEach(b => b.classList.toggle('active', b.dataset.page === page));
    renderPage(page);
  };

  window.updateOrderStatus = async (id, status) => {
    await api('PUT', `/api/admin/orders/${id}`, { status });
    toast('Статус обновлён', 'success');
  };

  window.toggleProduct = async (id, is_active) => {
    await api('PUT', `/api/admin/products/${id}`, { is_active });
    toast(is_active ? 'Товар активирован' : 'Товар скрыт', 'info');
    renderProducts();
  };

  window.toggleUser = async (id, is_active, btn) => {
    await api('PUT', `/api/admin/users/${id}`, { is_active });
    toast(is_active ? 'Пользователь активирован' : 'Пользователь заблокирован', 'info');
  };

  let editingProductId = null;
  window.openProductModal = (product) => {
    const modal = document.getElementById('product-modal');
    const form = document.getElementById('product-form');
    editingProductId = product?.id || null;
    document.getElementById('modal-title').textContent = product ? 'Редактировать товар' : 'Добавить товар';
    if (product) {
      Object.keys(product).forEach(key => {
        const el = form.elements[key];
        if (!el) return;
        if (el.type === 'checkbox') el.checked = !!product[key];
        else el.value = product[key] || '';
      });
    } else {
      form.reset();
      form.elements['is_active'].checked = true;
    }
    modal.style.display = 'flex';
  };

  async function saveProduct() {
    const form = document.getElementById('product-form');
    const data = {};
    new FormData(form).forEach((v, k) => { data[k] = v; });
    data.is_featured = form.elements['is_featured'].checked;
    data.is_active = form.elements['is_active'].checked;
    data.retail_price = parseFloat(data.retail_price) || 0;
    data.wholesale_price = parseFloat(data.wholesale_price) || null;
    data.distributor_price = parseFloat(data.distributor_price) || null;
    data.stock = parseInt(data.stock) || 0;

    try {
      if (editingProductId) await api('PUT', `/api/admin/products/${editingProductId}`, data);
      else await api('POST', '/api/admin/products', data);
      toast('Товар сохранён ✓', 'success');
      document.getElementById('product-modal').style.display = 'none';
      renderProducts();
    } catch (e) { toast(e.message, 'error'); }
  }

  // ── Helpers ────────────────────────────────────────────────
  function statusLabel(s) {
    return { new:'Новый', confirmed:'Подтверждён', processing:'В работе', shipped:'Отправлен', delivered:'Доставлен', cancelled:'Отменён' }[s] || s;
  }
  function roleLabel(r) {
    return { retail:'Розница', wholesale:'Оптовик', distributor:'Дистрибьютор', admin:'Администратор' }[r] || r;
  }

  // ── Load stats for badges ─────────────────────────────────
  async function loadBadges() {
    try {
      const stats = await api('GET', '/api/admin/stats');
      if (stats.pending_wholesale > 0) document.getElementById('ws-badge').textContent = stats.pending_wholesale;
    } catch {}
  }
  loadBadges();

  // ── Init ──────────────────────────────────────────────────
  renderPage('dashboard');
</script>
</body>
</html>
