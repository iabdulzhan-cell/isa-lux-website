<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заказ оформлен — ISA LUX</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { padding-top: var(--header-h); background: var(--off-white); }
    .success-page { min-height: calc(100vh - var(--header-h)); display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .success-card { background: var(--white); border-radius: var(--radius-xl); padding: 64px 48px; text-align: center; max-width: 520px; width: 100%; box-shadow: var(--shadow-lg); }
    .success-icon { font-size: 5rem; margin-bottom: 24px; animation: bounceIn 0.6s ease; }
    @keyframes bounceIn { 0%{transform:scale(0)} 70%{transform:scale(1.1)} 100%{transform:scale(1)} }
    .order-num { background: var(--off-white); border-radius: var(--radius-md); padding: 16px; font-family: var(--font-serif); font-size: 1.1rem; color: var(--gold-dark); font-weight: 700; margin: 20px 0; letter-spacing: 0.1em; }
  </style>
</head>
<body>
<div id="header-placeholder"></div>

<div class="success-page">
  <div class="success-card">
    <div class="success-icon">✅</div>
    <h2>Заказ оформлен!</h2>
    <p style="color:var(--gray-600);margin-top:12px">Спасибо за ваш заказ. Наш менеджер свяжется с вами в ближайшее время для подтверждения.</p>
    <div class="order-num" id="order-num">Загрузка...</div>
    <p style="font-size:0.85rem;color:var(--gray-400)">Сохраните номер заказа для отслеживания</p>
    <div style="display:flex;flex-direction:column;gap:12px;margin-top:32px">
      <a href="/catalog" class="btn btn-gold btn-full">Продолжить покупки</a>
      <a href="/account" class="btn btn-outline btn-full">Мои заказы</a>
    </div>
    <div style="margin-top:32px;padding-top:24px;border-top:1px solid var(--gray-200)">
      <p style="font-size:0.82rem;color:var(--gray-400);margin-bottom:12px">Есть вопросы? Свяжитесь с нами:</p>
      <div style="display:flex;gap:12px;justify-content:center">
        <a href="https://wa.me/77770000000" class="btn btn-sm btn-outline">WhatsApp</a>
        <a href="https://t.me/isalux" class="btn btn-sm btn-outline">Telegram</a>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script type="module">
  import { initPage } from '/js/app.js';
  import '/js/i18n.js';
  await initPage();
  const num = new URLSearchParams(window.location.search).get('num');
  document.getElementById('order-num').textContent = num ? `Заказ № ${num}` : 'Заказ оформлен';
</script>
</body>
</html>
