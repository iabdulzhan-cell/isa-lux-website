<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Войти — ISA LUX</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div id="header-placeholder"></div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="/" style="font-family:var(--font-serif);font-size:1.5rem;font-weight:700;color:var(--gold);letter-spacing:0.15em">ISA LUX</a>
    </div>
    <h2 data-i18n="login_title">Войти в аккаунт</h2>
    <p class="auth-subtitle">Для доступа к оптовым ценам необходимо войти</p>

    <div id="error-msg" style="display:none;background:#fff0f0;border:1px solid #fcc;color:var(--error);padding:12px 16px;border-radius:var(--radius-md);font-size:0.88rem;margin-bottom:20px"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" data-i18n="email_label">Email</label>
        <input type="email" class="form-input" id="email" placeholder="your@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="pass_label">Пароль</label>
        <input type="password" class="form-input" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-gold btn-full" id="submit-btn">
        <span data-i18n="login_btn">Войти</span>
      </button>
    </form>

    <div class="auth-divider"><span>или</span></div>

    <p style="text-align:center;font-size:0.88rem;color:var(--gray-600)">
      <span data-i18n="no_account">Нет аккаунта?</span>
      <a href="/register" style="color:var(--gold);font-weight:600;margin-left:4px">Зарегистрироваться</a>
    </p>
    <p style="text-align:center;font-size:0.82rem;color:var(--gray-400);margin-top:12px">
      <a href="/register?role=wholesale" style="color:var(--gold-dark)">🏢 Зарегистрироваться как оптовик</a>
    </p>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
  import { initPage, api, toast } from '/js/app.js';
  import '/js/i18n.js';
  await initPage();

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span>Входим...</span>';

    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';

    try {
      const data = await api('POST', '/api/auth/login', {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      });
      toast('Добро пожаловать, ' + data.user.name + '!', 'success');
      const redirect = new URLSearchParams(window.location.search).get('redirect') || '/';
      setTimeout(() => window.location.href = redirect, 800);
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<span data-i18n="login_btn">Войти</span>';
    }
  });
</script>
</body>
</html>
